name: Publish to Codemod Registry

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Publish codemod
        env:
          CODEMOD_AUTH_TOKEN: ${{ secrets.CODEMOD_AUTH_TOKEN }}
        run: npx codemod publish
